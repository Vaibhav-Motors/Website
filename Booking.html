<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garage Service Appointment</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
        }
        
        /* Appointment Section Styles */
        .appointment-section {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 30px;
            margin: 20px 0;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .section-header h2 {
            color: #2c3e50;
            font-size: 2.2rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .section-header p {
            color: #7f8c8d;
            font-size: 1.1rem;
        }
        
        /* Form Styles */
        .appointment-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
        }
        
        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
            background-color: #fff;
        }
        
        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 1em;
        }
        
        .service-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            padding: 8px 0;
        }
        
        .checkbox-group input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: #e67e22;
        }
        
        .form-submit {
            grid-column: 1 / -1;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .submit-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .whatsapp-btn {
            background-color: #25D366;
        }
        
        .submit-btn:hover {
            background-color: #d35400;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }
        
        .whatsapp-btn:hover {
            background-color: #128C7E;
        }
        
        /* See More Button Styles */
        .see-more-btn {
            background: none;
            border: none;
            color: #3498db;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 15px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .see-more-btn:hover {
            background-color: #f0f7fd;
        }

        .see-more-btn::after {
            content: '▼';
            font-size: 0.7rem;
            transition: transform 0.3s ease;
        }

        .see-more-btn.expanded::after {
            transform: rotate(180deg);
        }
        
        .additional-service {
            display: none;
        }
        
        /* Vehicle Details Section */
        .vehicle-details {
            grid-column: 1 / -1;
            margin: 20px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #e67e22;
        }
        
        .vehicle-details h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.3rem;
        }
        
        /* Date Status Styles */
        .date-status {
            margin-top: 8px;
            font-size: 0.85rem;
            padding: 8px 12px;
            border-radius: 4px;
            display: none;
        }
        
        .date-available {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        
        .date-full {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }
        
        .date-warning {
            background-color: #fff3e0;
            color: #ef6c00;
            border: 1px solid #ffcc80;
        }
        
        /* Slot Counter */
        .slot-counter {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            font-size: 0.9rem;
            color: #666;
        }
        
        .slot-dots {
            display: flex;
            gap: 4px;
        }
        
        .slot-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #e0e0e0;
        }
        
        .slot-dot.filled {
            background-color: #e67e22;
        }
        
        .slot-dot.available {
            background-color: #4caf50;
        }
        
        /* Responsive Adjustments */
        @media (max-width: 768px) {
            .appointment-form {
                grid-template-columns: 1fr;
            }
            
            .form-submit {
                flex-direction: column;
                gap: 12px;
            }
            
            .section-header h2 {
                font-size: 1.8rem;
            }
            
            .service-checkboxes {
                grid-template-columns: 1fr 1fr;
            }
        }
        
        @media (max-width: 480px) {
            .service-checkboxes {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 10px;
            }
            
            .appointment-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <section class="appointment-section">
            <div class="section-header">
                <h2 style="color: #2c3e50; font-size: 2.5rem; margin-bottom: 5px; font-weight: 700;">
                    Vaibhav <span style="color: #e67e22;">Motors</span>
                </h2>
                <h3 style="color: #2c3e50; font-size: 2.0rem; margin-bottom: 10px; font-weight: 700;">
                    Book Your Car Service
                </h3>
                <p>Schedule an appointment with our expert mechanics</p>
            </div>
            
            <form class="appointment-form" id="appointmentForm">
                <!-- Personal Information -->
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" 
                           placeholder="e.g. Rahul Sharma"
                           pattern="[A-Za-z\s]+"
                           title="Only alphabets and spaces allowed"
                           oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')"
                           required>
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" class="form-control" 
                           placeholder="e.g. 9876543210"
                           pattern="[0-9]{10}"
                           title="Please enter a valid 10-digit Indian phone number"
                           oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                           minlength="10"
                           maxlength="10"
                           required>
                </div>

                <!-- Vehicle Details Section -->
                <div class="vehicle-details">
                    <h3>Vehicle Information</h3>
                    
                    <div class="form-group">
                        <label for="fuel-type">Fuel Type</label>
                        <select id="fuel-type" class="form-control" required>
                            <option value="">Select Fuel Type</option>
                            <option value="petrol">Petrol</option>
                            <option value="cng">CNG</option>
                            <option value="diesel">Diesel</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="car-brand">Car Brand</label>
                        <select id="car-brand" class="form-control" required onchange="loadModels()">
                            <option value="">Select Car Brand</option>
                            <option value="Maruti">Maruti</option>
                            <option value="Mahindra">Mahindra</option>
                            <option value="TATA">TATA</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Hyundai">Hyundai</option>
                            <option value="Honda">Honda</option>
                            <option value="Kia">Kia</option>
                            <option value="Renault">Renault</option>
                            <option value="Volkswagen">Volkswagen</option>
                            <option value="Skoda">Skoda</option>
                            <option value="Ford">Ford</option>
                            <option value="MG">MG</option>
                            <option value="Nissan">Nissan</option>
                            <option value="Jeep">Jeep</option>
                            <option value="BMW">BMW</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="Audi">Audi</option>
                            <option value="Volvo">Volvo</option>
                            <option value="Jaguar">Jaguar</option>
                            <option value="Land Rover">Land Rover</option>
                        </select>
                    </div>

                    <div class="form-group" id="model-section" style="display:none;">
                        <label for="car-model">Car Model</label>
                        <select id="car-model" class="form-control" required>
                            <option value="">Select Model</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="vehicle-variant">Vehicle Variant</label>
                        <input type="text" id="vehicle-variant" class="form-control" 
                               placeholder="e.g. VXI, ZX, SPORTZ"
                               pattern="[A-Z0-9\s]+"
                               title="Only uppercase letters and numbers allowed"
                               oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9\s]/g, '')"
                               maxlength="15"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="manufacturing-year">Manufacturing Year</label>
                        <select id="manufacturing-year" class="form-control" required>
                            <option value="">Select Year</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                            <option value="2022">2022</option>
                            <option value="2021">2021</option>
                            <option value="2020">2020</option>
                            <option value="2019">2019</option>
                            <option value="2018">2018</option>
                            <option value="2017">2017</option>
                            <option value="2016">2016</option>
                            <option value="2015">2015</option>
                            <option value="2014">2014</option>
                            <option value="2013">2013</option>
                            <option value="2012">2012</option>
                            <option value="2011">2011</option>
                            <option value="2010">2010</option>
                            <option value="2009">2009</option>
                            <option value="2008">2008</option>
                            <option value="2007">2007</option>
                            <option value="2006">2006</option>
                            <option value="2005">2005</option>
                            <option value="2004">2004</option>
                            <option value="2003">2003</option>
                            <option value="2002">2002</option>
                            <option value="2001">2001</option>
                            <option value="2000">2000</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="registration-number">Registration Number</label>
                        <input type="text" id="registration-number" class="form-control" 
                               placeholder="e.g. MH12AB1234"
                               pattern="[A-Z]{2}[0-9]{1,2}[A-Z]{1,2}[0-9]{4}"
                               title="Enter valid Indian registration (e.g. MH12AB1234, DL1CA1234)"
                               oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '')"
                               required>
                    </div>

                    <div class="form-group">
                        <label for="chassis-number">Vehicle Chassis Number (VIN)</label>
                        <input type="text" id="chassis-number" class="form-control" 
                               placeholder="e.g. MA1AB2345CD6789012"
                               pattern="[A-HJ-NPR-Z0-9]{10,20}"
                               title="Must be 10-20 uppercase letters/numbers (excludes I, O, Q)"
                               oninput="this.value = this.value.toUpperCase().replace(/[^A-HJ-NPR-Z0-9]/g, '')"
                               required>
                    </div>
                </div>
                
                <!-- Appointment Details -->
                <div class="form-group">
                    <label for="date">Preferred Date</label>
                    <input type="date" id="date" class="form-control" required>
                    <div id="date-status" class="date-status"></div>
                    <div id="slot-counter" class="slot-counter">
                        <span>Slots:</span>
                        <div class="slot-dots" id="slot-dots">
                            <!-- Slot dots will be generated by JavaScript -->
                        </div>
                        <span id="slot-text">5 slots available</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="time">Preferred Time</label>
                    <select id="time" class="form-control" required>
                        <option value="">Select a time</option>
                        <option value="morning">Morning (8AM - 12PM)</option>
                        <option value="afternoon">Afternoon (12PM - 4PM)</option>
                        <option value="evening">Evening (4PM - 6PM)</option>
                    </select>
                </div>
                
                <!-- Services Section -->
                <div class="form-group">
                    <label>Services Needed</label>
                    <div class="service-checkboxes" id="services-container">
                        <!-- First 5 services (visible by default) -->
                        <div class="checkbox-group">
                            <input type="checkbox" id="oil-change" name="service">
                            <label for="oil-change">Oil Change</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="tire-rotation" name="service">
                            <label for="tire-rotation">Tire Rotation</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="brake-service" name="service">
                            <label for="brake-service">Brake Service</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="diagnostics" name="service">
                            <label for="diagnostics">Diagnostics</label>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="battery-check" name="service">
                            <label for="battery-check">Battery Check</label>
                        </div>
                        
                        <!-- Additional services (hidden by default) -->
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="periodic-service" name="service">
                            <label for="periodic-service">Periodic Service</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="ac-repair" name="service">
                            <label for="ac-repair">AC Repair</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="inspection" name="service">
                            <label for="inspection">Inspection</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="major-service" name="service">
                            <label for="major-service">Major Service</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="accidental-service" name="service">
                            <label for="accidental-service">Accidental Repair</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="engine-repair" name="service">
                            <label for="engine-repair">Engine Repair</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="suspension-service" name="service">
                            <label for="suspension-service">Suspension</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="polishing-service" name="service">
                            <label for="polishing-service">Polishing</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="interior-service" name="service">
                            <label for="interior-service">Interior</label>
                        </div>
                        <div class="checkbox-group additional-service">
                            <input type="checkbox" id="other" name="service">
                            <label for="other">Other</label>
                        </div>
                    </div>
                    
                    <button type="button" id="see-more-btn" class="see-more-btn">See More Services ▼</button>
                </div>
                
                <div class="form-group">
                    <label for="notes">Additional Notes ( Optional )</label>
                    <textarea id="notes" class="form-control" rows="4" placeholder="Any specific issues or requests..."></textarea>
                </div>
                
                <div class="form-submit">
                    <button type="button" class="submit-btn whatsapp-btn" onclick="sendToWhatsApp()">
                        Book Service
                    </button>
                </div>
            </form>
        </section>
    </div>

    // Function to get today's date in YYYY-MM-DD format (timezone safe)
    function getTodayDate() {
        const now = new Date();
        // Adjust for timezone offset to get correct local date
        const timezoneOffset = now.getTimezoneOffset() * 60000; // offset in milliseconds
        const localDate = new Date(now.getTime() - timezoneOffset);
        return localDate.toISOString().split('T')[0];
    }

    // Set minimum date to today for the date input
    document.addEventListener('DOMContentLoaded', function() {
        const dateInput = document.getElementById('date');
        const today = getTodayDate();
        dateInput.setAttribute('min', today);
        
        // Add event listener for date changes
        dateInput.addEventListener('change', checkDateAvailability);
        
        // Initialize slot counter
        updateSlotCounter(5);
        
        // See More Services functionality
        const seeMoreBtn = document.getElementById('see-more-btn');
        
        seeMoreBtn.addEventListener('click', function() {
            const additionalServices = document.querySelectorAll('.additional-service');
            const btn = this;
            
            additionalServices.forEach(service => {
                if (service.style.display === 'none' || !service.style.display) {
                    service.style.display = 'flex';
                    btn.textContent = 'See Less Services';
                    btn.classList.add('expanded');
                } else {
                    service.style.display = 'none';
                    btn.textContent = 'See More Services';
                    btn.classList.remove('expanded');
                }
            });
        });
    });

    // Function to update slot counter visualization
    function updateSlotCounter(slotsLeft) {
        const slotDots = document.getElementById('slot-dots');
        const slotText = document.getElementById('slot-text');
        
        // Clear existing dots
        slotDots.innerHTML = '';
        
        // Create 5 dots
        for (let i = 0; i < 5; i++) {
            const dot = document.createElement('div');
            dot.className = 'slot-dot';
            
            if (i < (5 - slotsLeft)) {
                dot.classList.add('filled');
            } else {
                dot.classList.add('available');
            }
            
            slotDots.appendChild(dot);
        }
        
        // Update text
        if (slotsLeft === 0) {
            slotText.textContent = 'No slots available';
        } else if (slotsLeft === 1) {
            slotText.textContent = '1 slot remaining';
        } else {
            slotText.textContent = `${slotsLeft} slots available`;
        }
    }

    // Function to check date availability
    function checkDateAvailability() {
        const dateInput = document.getElementById('date');
        const dateStatus = document.getElementById('date-status');
        const selectedDate = dateInput.value;
        
        if (!selectedDate) {
            dateStatus.style.display = 'none';
            updateSlotCounter(5);
            return;
        }
        
        // Check if date is in the past
        const today = getTodayDate();
        if (selectedDate < today) {
            dateStatus.textContent = "Please select a future date";
            dateStatus.className = "date-status date-full";
            dateStatus.style.display = 'block';
            updateSlotCounter(0);
            return;
        }
        
        // Check booking count for selected date
        const bookingCount = bookingsData[selectedDate] || 0;
        const slotsLeft = 5 - bookingCount;
        
        // Update slot counter
        updateSlotCounter(slotsLeft);
        
        if (bookingCount >= 5) {
            dateStatus.textContent = "❌ Booking Full for this date. Please select another date.";
            dateStatus.className = "date-status date-full";
            dateStatus.style.display = 'block';
        } else if (slotsLeft === 1) {
            dateStatus.textContent = "⚠️ Only 1 slot remaining for this date! Book quickly!";
            dateStatus.className = "date-status date-warning";
            dateStatus.style.display = 'block';
        } else if (slotsLeft === 2) {
            dateStatus.textContent = "ℹ️ Only 2 slots remaining for this date";
            dateStatus.className = "date-status date-warning";
            dateStatus.style.display = 'block';
        } else {
            dateStatus.textContent = `✅ ${slotsLeft} slots available for this date`;
            dateStatus.className = "date-status date-available";
            dateStatus.style.display = 'block';
        }
    }

    // Function to load models based on selected brand
    function loadModels() {
        const brandSelect = document.getElementById('car-brand');
        const modelSelect = document.getElementById('car-model');
        const modelSection = document.getElementById('model-section');
        
        // Clear previous models
        modelSelect.innerHTML = '<option value="">Select Model</option>';
        
        // Get selected brand
        const selectedBrand = brandSelect.value;
        
        if (selectedBrand && carModels[selectedBrand]) {
            // Show model section
            modelSection.style.display = 'block';
            
            // Add models to dropdown
            carModels[selectedBrand].forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                option.textContent = model;
                modelSelect.appendChild(option);
            });
        } else {
            // Hide model section if no brand selected
            modelSection.style.display = 'none';
        }
    }

    // WhatsApp Functionality
    function sendToWhatsApp() {
        const form = document.getElementById('appointmentForm');
        const requiredFields = form.querySelectorAll('[required]');
        let isValid = true;

        // Check each required field
        requiredFields.forEach(field => {
            if (!field.value.trim()) {
                field.style.borderColor = 'red';
                isValid = false;
            } else {
                field.style.borderColor = ''; // Reset if valid
            }
            
            // Special validation for registration number
            if (field.id === 'registration-number') {
                const regEx = /^[A-Z]{2}[0-9]{1,2}[A-Z]{1,2}[0-9]{4}$/;
                if (!regEx.test(field.value)) {
                    field.style.borderColor = 'red';
                    isValid = false;
                }
            }
            
            // Special validation for chassis number
            if (field.id === 'chassis-number') {
                const regEx = /^[A-HJ-NPR-Z0-9]{10,20}$/;
                if (!regEx.test(field.value)) {
                    field.style.borderColor = 'red';
                    isValid = false;
                }
            }
        });

        // Check date availability before proceeding
        const dateInput = document.getElementById('date');
        const selectedDate = dateInput.value;
        const bookingCount = bookingsData[selectedDate] || 0;
        
        if (bookingCount >= 5) {
            alert('❌ Booking Full for this date. Please select another date.');
            dateInput.focus();
            return;
        }

        if (!isValid) {
            alert('Please fill in all required fields correctly');
            return;
        }

        // Get all form values
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const fuelType = document.getElementById('fuel-type').value;
        const brand = document.getElementById('car-brand').value;
        const model = document.getElementById('car-model').value;
        const variant = document.getElementById('vehicle-variant').value;
        const year = document.getElementById('manufacturing-year').value;
        const regNumber = document.getElementById('registration-number').value;
        const chassisNumber = document.getElementById('chassis-number').value;
        const date = document.getElementById('date').value;
        const time = document.getElementById('time').value;
        
        // Format date
        const formattedDate = new Date(date).toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });
        
        // Get selected services
        let services = [];
        document.querySelectorAll('input[name="service"]:checked').forEach(checkbox => {
            services.push(checkbox.nextElementSibling.textContent);
        });
        
        // Create complete message with congratulations
        const message = `*New Garage Service Appointment Request* 🚗🔧\n\n` +
                       `*Customer Name:* ${name}\n` +
                       `*Contact Number:* ${phone}\n` +
                       `*Vehicle Details:* ${brand} ${model} (${variant})\n` +
                       `*Fuel Type:* ${fuelType}\n` +
                       `*Manufacturing Year:* ${year}\n` +
                       `*Registration:* ${regNumber}\n` +
                       `*Chassis Number (VIN):* ${chassisNumber}\n` +
                       `*Preferred Date:* ${formattedDate}\n` +
                       `*Preferred Time:* ${time}\n` +
                       `*Services Needed:* ${services.join(', ') || 'None'}\n` +
                       `${document.getElementById('notes').value ? `*Additional Notes:*\n${document.getElementById('notes').value}` : ''}\n\n` +
                       `---\n` +
                       `🎉 *Booking Confirmed!*\n` +
                       `Thank you for choosing Vaibhav Motors! Your appointment request has been received. We will contact you shortly to confirm the timing.\n\n` +
                       `📍 *Vaibhav Motors*\n` +
                       `📞 +91 80872 67039\n` +
                       `⏰ Mon-Sat: 8AM-8PM`;
        
        // Encode for URL
        const encodedMessage = encodeURIComponent(message);
        
        // WhatsApp number
        const whatsappNumber = "918087267039";
        
        // Open WhatsApp
        window.open(`https://wa.me/${whatsappNumber}?text=${encodedMessage}`, '_blank');
        
        // Show local congratulations popup
        showCongratulations(name, formattedDate);
        
        // Simulate booking update (in real app, this would update database)
        const slotsLeft = 5 - bookingCount;
        let confirmationMessage = `Booking request sent! We'll confirm your appointment shortly.`;
        
        if (slotsLeft === 1) {
            confirmationMessage += `\n\n⚠️ This was the last slot for ${formattedDate}!`;
        } else if (slotsLeft === 2) {
            confirmationMessage += `\n\nℹ️ Only 1 slot remaining for ${formattedDate} after your booking.`;
        } else {
            confirmationMessage += `\n\n✅ ${slotsLeft - 1} slots remaining for ${formattedDate} after your booking.`;
        }
        
        // Update the booking count (in real app, this would be server-side)
        // For demo purposes only
        bookingsData[selectedDate] = (bookingsData[selectedDate] || 0) + 1;
        
        // Refresh date status display
        setTimeout(() => {
